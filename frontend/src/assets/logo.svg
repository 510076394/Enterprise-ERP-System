<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 主圆形背景 -->
  <circle cx="50" cy="50" r="45" fill="#409EFF" stroke="#fff" stroke-width="2"/>

  <!-- 渐变效果 -->
  <defs>
    <radialGradient id="logoGradient" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#5DADE2;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#409EFF;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 应用渐变的主圆形 -->
  <circle cx="50" cy="50" r="45" fill="url(#logoGradient)" stroke="#fff" stroke-width="2" filter="url(#shadow)"/>

  <!-- 字母 K -->
  <text x="50" y="75" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="70" font-weight="bold" style="text-shadow: 0 2px 4px rgba(0,0,0,0.3);">K</text>

  <!-- 装饰性光泽效果 -->
  <ellipse cx="38" cy="35" rx="8" ry="12" fill="rgba(255,255,255,0.3)" transform="rotate(-20 38 35)"/>
</svg>